<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 64 64" width="64" height="64">
  <style>
    /* وضع النهار: خلفية كحلية + لوجو أبيض */
    .bg { fill: #152546; }
    /* وضع الليل: خلفية أخف قليلاً */
    @media (prefers-color-scheme: dark) {
      .bg { fill: #1e3a6e; }
    }
  </style>
  <!-- خلفية دائماً ملوّنة حتى يظهر اللوجو الأبيض -->
  <rect width="64" height="64" rx="10" class="bg"/>
  <image href="logo.png" x="4" y="4" width="56" height="56"
         preserveAspectRatio="xMidYMid meet"/>
</svg>
