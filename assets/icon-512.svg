<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- خلفية مدوّرة كحلية -->
  <rect width="512" height="512" rx="96" fill="#152546"/>
  
  <!-- دائرة ذهبية خلفية -->
  <circle cx="256" cy="230" r="145" fill="#D4AF37" opacity="0.15"/>
  
  <!-- نجمة/بريق ذهبية -->
  <polygon points="256,80 270,150 320,120 280,175 340,195 275,210 290,275 256,230 222,275 237,210 172,195 232,175 192,120 242,150" fill="#D4AF37"/>
  
  <!-- اسم المتجر -->
  <text x="256" y="360" text-anchor="middle" font-family="Arial, sans-serif" font-size="90" font-weight="bold" fill="#FFFFFF" letter-spacing="2">بريق</text>
  
  <!-- خط ذهبي تحت الاسم -->
  <rect x="156" y="375" width="200" height="5" rx="3" fill="#D4AF37"/>
</svg>
