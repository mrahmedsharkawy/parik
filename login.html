<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <title>تسجيل الدخول - Bariq</title>
  <link rel="icon" type="image/svg+xml" href="assets/favicon.svg">
  <link rel="icon" type="image/png" href="assets/logo.png">
  <link rel="apple-touch-icon" href="assets/logo.png">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <style>@media(max-width:899px){.main-header .dropdown,.main-header .cart{display:none!important}}</style>
  <link rel="stylesheet" href="style/style.css" />
  <style>
    /* === override main === */
    body { background: #f4f5f702; }
    #main.main {
      width: 100% !important;
      max-width: 100% !important;
      display: flex !important;
      flex-direction: column !important;
      align-items: center !important;
      justify-content: center !important;
      margin: 0 !important;
      padding: 80px 16px 40px !important;
      min-height: 100vh !important;
      box-sizing: border-box !important;
    }

    /* === بطاقة الدخول === */
    .auth-card {
      background: #fff;
      border-radius: 20px;
      border: 1px solid #eee;
      box-shadow: 0 8px 40px rgba(0,0,0,0.08);
      width: 100%;
      max-width: 460px;
      overflow: hidden;
    }

    /* الشعار */
    .auth-logo {
      text-align: center;
      padding: 28px 24px 0;
    }
    .auth-logo img { height: 40px; }
    .auth-logo h2 {
      font-size: 1.4rem;
      font-weight: 800;
      color: #111;
      margin: 12px 0 4px;
    }
    .auth-logo p { font-size: 0.85rem; color: #888; margin: 0 0 20px; }

    /* التبويبات */
    .auth-tabs {
      display: grid;
      grid-template-columns: 1fr 1fr;
      border-bottom: 1px solid #f0f0f0;
    }
    .auth-tab {
      padding: 14px;
      text-align: center;
      font-size: 0.92rem;
      font-weight: 700;
      color: #888;
      cursor: pointer;
      border-bottom: 3px solid transparent;
      transition: all 0.2s;
    }
    .auth-tab.active { color: #D4AF37; border-bottom-color: #D4AF37; background: rgba(21,37,70,0.07); }

    /* النماذج */
    .auth-form { padding: 24px; display: none; }
    .auth-form.active { display: block; }

    .auth-input-group { margin-bottom: 16px; }
    .auth-input-group label {
      display: block;
      font-size: 0.82rem;
      font-weight: 700;
      color: #444;
      margin-bottom: 6px;
    }
    .auth-input-wrap {
      position: relative;
      display: flex;
      align-items: center;
    }
    .auth-input-wrap input {
      width: 100%;
      border: 1.5px solid #e0e0e0;
      border-radius: 10px;
      padding: 11px 14px 11px 42px;
      font-size: 0.88rem;
      outline: none;
      transition: border-color 0.15s;
      box-sizing: border-box;
      color: #222;
    }
    .auth-input-wrap input:focus { border-color: #D4AF37; }
    .auth-input-wrap .input-ico {
      position: absolute;
      left: 14px;
      font-size: 1rem;
      color: #bbb;
      pointer-events: none;
    }
    .auth-input-wrap .toggle-pass {
      position: absolute;
      right: 12px;
      font-size: 0.85rem;
      color: #aaa;
      cursor: pointer;
      padding: 4px;
    }
    .auth-input-wrap input:focus + .toggle-pass,
    .auth-input-wrap .toggle-pass:hover { color: #D4AF37; }

    /* خطأ */
    .auth-error {
      background: #fff0f0;
      color: #c62828;
      border: 1px solid #ffcdd2;
      border-radius: 8px;
      padding: 9px 14px;
      font-size: 0.82rem;
      margin-bottom: 14px;
      display: none;
    }

    /* الزر الرئيسي */
    .auth-btn {
      width: 100%;
      background: linear-gradient(135deg, #152546, #0d1c38);
      color: #fff;
      border: none;
      border-radius: 50px;
      padding: 14px;
      font-size: 0.95rem;
      font-weight: 800;
      cursor: pointer;
      transition: opacity 0.15s;
      margin-top: 4px;
    }
    .auth-btn:hover { opacity: 0.93; }
    .auth-btn:disabled { opacity: 0.6; cursor: not-allowed; }

    /* نسيت كلمة المرور */
    .auth-forgot {
      text-align: left;
      margin-bottom: 14px;
    }
    .auth-forgot a {
      font-size: 0.8rem;
      color: #D4AF37;
      text-decoration: none;
      font-weight: 600;
    }

    /* فاصل */
    .auth-divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 18px 0;
      color: #ccc;
      font-size: 0.8rem;
    }
    .auth-divider::before,
    .auth-divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: #eee;
    }

    /* تسجيل بالشبكات الاجتماعية */
    .auth-social { display: flex; gap: 10px; margin-bottom: 4px; }
    .auth-social-btn {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 10px;
      border: 1.5px solid #e0e0e0;
      border-radius: 10px;
      font-size: 0.82rem;
      font-weight: 600;
      color: #333;
      cursor: pointer;
      background: #fff;
      transition: border-color 0.15s, background 0.15s;
    }
    .auth-social-btn:hover { border-color: #D4AF37; background: rgba(21,37,70,0.07); }
    .auth-social-btn img { width: 18px; height: 18px; }

    /* قوة كلمة المرور */
    .strength-bar {
      height: 4px;
      border-radius: 4px;
      background: #eee;
      margin-top: 6px;
      overflow: hidden;
    }
    .strength-fill {
      height: 100%;
      width: 0%;
      border-radius: 4px;
      transition: width 0.3s, background 0.3s;
    }
    .strength-label { font-size: 0.72rem; color: #888; margin-top: 3px; }

    /* موافقة الشروط */
    .auth-terms {
      display: flex;
      align-items: flex-start;
      gap: 8px;
      font-size: 0.78rem;
      color: #666;
      margin-bottom: 16px;
      line-height: 1.5;
    }
    .auth-terms input[type="checkbox"] {
      accent-color: #D4AF37;
      width: 16px;
      height: 16px;
      flex-shrink: 0;
      margin-top: 2px;
    }
    .auth-terms a { color: #D4AF37; text-decoration: none; }

    /* footer */
    .auth-footer {
      text-align: center;
      padding: 16px 24px 20px;
      font-size: 0.82rem;
      color: #888;
      border-top: 1px solid #f5f5f5;
    }
    .auth-footer a { color: #D4AF37; font-weight: 600; text-decoration: none; }

    /* نجاح */
    .auth-success {
      display: none;
      text-align: center;
      padding: 40px 24px;
    }
    .auth-success .s-icon { font-size: 3.5rem; margin-bottom: 12px; }
    .auth-success h3 { font-size: 1.1rem; font-weight: 700; color: #111; margin-bottom: 8px; }
    .auth-success p { font-size: 0.85rem; color: #888; margin-bottom: 20px; }

    /* موبايل */
    @media (max-width: 480px) {
      .auth-card { border-radius: 16px; }
      .auth-social { flex-direction: column; }
    }
  </style>
</head>
<body>
<div class="page">

  <header class="main-header" style="background:#152546;padding:10px 0">
    <div style="max-width:1400px;margin:0 auto;padding:0 20px;display:flex;align-items:center;justify-content:space-between">
      <a href="index.html"><img src="assets/logo.png" alt="Bariq Logo" style="height:34px"></a>
      <a href="index.html" style="color:#fff;font-size:0.85rem;text-decoration:none;display:flex;align-items:center;gap:6px">
        ← العودة للمتجر
      </a>
    </div>
  </header>

  <main class="main" id="main">

    <div class="auth-card">

      <div class="auth-logo">
        <img src="assets/logo.png" alt="Bariq Logo">
        <h2>مرحباً بك</h2>
        <p>سجّل دخولك أو أنشئ حساباً جديداً</p>
      </div>

      <!-- التبويبات -->
      <div class="auth-tabs">
        <div class="auth-tab active" onclick="switchTab('login')">🔑 تسجيل الدخول</div>
        <div class="auth-tab" onclick="switchTab('register')">📝 إنشاء حساب</div>
      </div>

      <!-- ===== نموذج تسجيل الدخول ===== -->
      <div class="auth-form active" id="form-login">

        <div class="auth-error" id="login-error"></div>

        <div class="auth-input-group">
          <label>البريد الإلكتروني أو رقم الهاتف</label>
          <div class="auth-input-wrap">
            <input type="text" id="login-email" placeholder="example@email.com" autocomplete="email">
            <span class="input-ico">📧</span>
          </div>
        </div>

        <div class="auth-input-group">
          <label>كلمة المرور</label>
          <div class="auth-input-wrap">
            <input type="password" id="login-pass" placeholder="••••••••" autocomplete="current-password">
            <span class="input-ico">🔒</span>
            <span class="toggle-pass" onclick="togglePass('login-pass', this)">👁</span>
          </div>
        </div>

        <div class="auth-forgot">
          <a href="#" onclick="showForgot()">نسيت كلمة المرور؟</a>
        </div>

        <button class="auth-btn" onclick="doLogin()">تسجيل الدخول</button>

        <div class="auth-divider">أو</div>

        <div class="auth-social">
          <button class="auth-social-btn" onclick="socialLogin('google')">
            <svg width="18" height="18" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
            Google
          </button>
          <button class="auth-social-btn" onclick="socialLogin('facebook')">
            <svg width="18" height="18" viewBox="0 0 24 24"><path fill="#1877F2" d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/></svg>
            Facebook
          </button>
        </div>
      </div>

      <!-- ===== نموذج إنشاء الحساب ===== -->
      <div class="auth-form" id="form-register">

        <div class="auth-error" id="register-error"></div>

        <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
          <div class="auth-input-group" style="margin-bottom:0">
            <label>الاسم الأول</label>
            <div class="auth-input-wrap">
              <input type="text" id="reg-fname" placeholder="محمد">
              <span class="input-ico">👤</span>
            </div>
          </div>
          <div class="auth-input-group" style="margin-bottom:0">
            <label>الاسم الأخير</label>
            <div class="auth-input-wrap">
              <input type="text" id="reg-lname" placeholder="أحمد">
              <span class="input-ico">👤</span>
            </div>
          </div>
        </div>

        <div class="auth-input-group" style="margin-top:16px">
          <label>البريد الإلكتروني</label>
          <div class="auth-input-wrap">
            <input type="email" id="reg-email" placeholder="example@email.com" autocomplete="email">
            <span class="input-ico">📧</span>
          </div>
        </div>

        <div class="auth-input-group">
          <label>رقم الهاتف</label>
          <div class="auth-input-wrap">
            <input type="tel" id="reg-phone" placeholder="+971 XX XXX XXXX">
            <span class="input-ico">📱</span>
          </div>
        </div>

        <div class="auth-input-group">
          <label>كلمة المرور</label>
          <div class="auth-input-wrap">
            <input type="password" id="reg-pass" placeholder="8 أحرف على الأقل" autocomplete="new-password" oninput="checkStrength(this.value)">
            <span class="input-ico">🔒</span>
            <span class="toggle-pass" onclick="togglePass('reg-pass', this)">👁</span>
          </div>
          <div class="strength-bar"><div class="strength-fill" id="strength-fill"></div></div>
          <div class="strength-label" id="strength-label"></div>
        </div>

        <div class="auth-input-group">
          <label>تأكيد كلمة المرور</label>
          <div class="auth-input-wrap">
            <input type="password" id="reg-pass2" placeholder="أعد كتابة كلمة المرور" autocomplete="new-password">
            <span class="input-ico">🔒</span>
          </div>
        </div>

        <div class="auth-terms">
          <input type="checkbox" id="reg-terms">
          <label for="reg-terms">
            أوافق على <a href="policy.html">شروط الاستخدام</a> و<a href="policy.html">سياسة الخصوصية</a> الخاصة بـ Bariq
          </label>
        </div>

        <button class="auth-btn" onclick="doRegister()">إنشاء حساب جديد</button>

        <div class="auth-divider">أو</div>

        <div class="auth-social">
          <button class="auth-social-btn" onclick="socialLogin('google')">
            <svg width="18" height="18" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
            Google
          </button>
          <button class="auth-social-btn" onclick="socialLogin('facebook')">
            <svg width="18" height="18" viewBox="0 0 24 24"><path fill="#1877F2" d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/></svg>
            Facebook
          </button>
        </div>
      </div>

      <!-- نجاح -->
      <div class="auth-success" id="auth-success">
        <div class="s-icon">🎉</div>
        <h3 id="success-title">تم تسجيل الدخول بنجاح!</h3>
        <p id="success-msg">جارٍ تحويلك...</p>
        <button class="auth-btn" style="max-width:200px;margin:0 auto" onclick="window.location.href='account.html'">
          الذهاب لحسابي
        </button>
      </div>

      <div class="auth-footer">
        <a href="index.html">← العودة للمتجر</a>
      </div>

    </div><!-- end auth-card -->

  </main>

  <script src="java/main.js" defer></script>
  <script src="translations/translation.js" defer></script>
  <script>
  /* === Auth Logic === */
  const PROFILE_KEY = 'x2_profile';
  const _SB_URL = 'https://knleehjjejfeobcmpwnw.supabase.co';
  const _SB_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtubGVlaGpqZWpmZW9iY21wd253Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQwMjk1NzAsImV4cCI6MjA5OTYwNTU3MH0.Q5Peb8CXDYNSPtQJGK6meij4vFRfOUq9qFz4rHBXE8E';

  function switchTab(tab) {
    document.querySelectorAll('.auth-tab').forEach((t,i) => t.classList.toggle('active', (i===0&&tab==='login')||(i===1&&tab==='register')));
    document.getElementById('form-login').classList.toggle('active', tab==='login');
    document.getElementById('form-register').classList.toggle('active', tab==='register');
    document.getElementById('auth-success').style.display = 'none';
    hideErrors();
  }

  function togglePass(id, el) {
    const inp = document.getElementById(id);
    if (inp.type === 'password') { inp.type = 'text'; el.textContent = '🙈'; }
    else { inp.type = 'password'; el.textContent = '👁'; }
  }

  function showError(id, msg) {
    const el = document.getElementById(id);
    el.textContent = msg;
    el.style.display = 'block';
  }

  function hideErrors() {
    ['login-error','register-error'].forEach(id => {
      const el = document.getElementById(id);
      if (el) { el.style.display = 'none'; el.textContent = ''; }
    });
  }

  function checkStrength(pass) {
    const fill = document.getElementById('strength-fill');
    const label = document.getElementById('strength-label');
    if (!pass) { fill.style.width = '0%'; label.textContent = ''; return; }
    let score = 0;
    if (pass.length >= 8) score++;
    if (/[A-Z]/.test(pass)) score++;
    if (/[0-9]/.test(pass)) score++;
    if (/[^A-Za-z0-9]/.test(pass)) score++;
    const levels = [
      { w:'25%', c:'#e53935', t:'ضعيفة' },
      { w:'50%', c:'#fb8c00', t:'مقبولة' },
      { w:'75%', c:'#fdd835', t:'جيدة' },
      { w:'100%', c:'#43a047', t:'قوية جداً' }
    ];
    const l = levels[Math.max(0, score-1)];
    fill.style.width = l.w;
    fill.style.background = l.c;
    label.textContent = 'قوة كلمة المرور: ' + l.t;
    label.style.color = l.c;
  }

  async function doLogin() {
    hideErrors();
    const email = document.getElementById('login-email').value.trim();
    const pass  = document.getElementById('login-pass').value;
    const btn   = document.querySelector('#form-login .auth-btn');

    if (!email) { showError('login-error', '⚠️ من فضلك أدخل البريد الإلكتروني'); return; }
    if (!pass)  { showError('login-error', '⚠️ من فضلك أدخل كلمة المرور'); return; }

    if (btn) { btn.disabled = true; btn.textContent = '⏳ جارٍ التحقق...'; }

    // محاولة تسجيل الدخول عبر Supabase Auth
    try {
      await new Promise(r => { if (window.Supabase) r(); else { const t = setInterval(() => { if (window.Supabase) { clearInterval(t); r(); } }, 100); setTimeout(() => { clearInterval(t); r(); }, 4000); } });

      const data = await window.Supabase.Auth.signIn(email, pass);
      const user = data.user || {};
      const meta = user.user_metadata || {};
      const name = meta.full_name || meta.name || email.split('@')[0];

      // حفظ الجلسة
      localStorage.setItem(PROFILE_KEY, JSON.stringify({ name, email: user.email || email, phone: meta.phone || '' }));
      localStorage.setItem('x2_logged', '1');
      if (data.access_token) localStorage.setItem('x2_token', data.access_token);

      // مزامنة مع جدول customers
      try { await window.Supabase.Customers.upsert({ name, email: user.email || email, phone: meta.phone || '' }); } catch(e) {}

      showSuccess('تم تسجيل الدخول بنجاح! 🎉', 'مرحباً ' + name.split(' ')[0] + '! جارٍ تحويلك...');
      setTimeout(() => { window.location.href = 'account.html'; }, 1200);

    } catch(supaErr) {
      // fallback للتحقق المحلي (لأجهزة بدون اتصال)
      try {
        const users = JSON.parse(localStorage.getItem('x2_users') || '[]');
        const user = users.find(u => u.email === email || u.phone === email);
        if (user && user.pass === btoa(pass)) {
          localStorage.setItem(PROFILE_KEY, JSON.stringify({ name: user.name, email: user.email, phone: user.phone }));
          localStorage.setItem('x2_logged', '1');
          showSuccess('تم تسجيل الدخول! 🎉', 'جارٍ تحويلك...');
          setTimeout(() => { window.location.href = 'account.html'; }, 1200);
          return;
        }
      } catch(e) {}

      const msg = supaErr.message || '';
      if (msg.includes('Invalid login') || msg.includes('invalid') || msg.includes('credentials')) {
        showError('login-error', '❌ البريد الإلكتروني أو كلمة المرور غير صحيحة');
      } else if (msg.includes('Email not confirmed')) {
        showError('login-error', '📧 يرجى تفعيل حسابك من البريد الإلكتروني أولاً');
      } else {
        showError('login-error', '❌ ' + msg);
      }
      if (btn) { btn.disabled = false; btn.textContent = 'تسجيل الدخول'; }
    }
  }

  async function doRegister() {
    hideErrors();
    const fname = document.getElementById('reg-fname').value.trim();
    const lname = document.getElementById('reg-lname').value.trim();
    const email = document.getElementById('reg-email').value.trim();
    const phone = document.getElementById('reg-phone').value.trim();
    const pass  = document.getElementById('reg-pass').value;
    const pass2 = document.getElementById('reg-pass2').value;
    const terms = document.getElementById('reg-terms').checked;

    if (!fname)  { showError('register-error', '⚠️ أدخل اسمك الأول'); return; }
    if (!email)  { showError('register-error', '⚠️ أدخل البريد الإلكتروني'); return; }
    if (!/^\S+@\S+\.\S+$/.test(email)) { showError('register-error', '⚠️ البريد الإلكتروني غير صحيح'); return; }
    if (pass.length < 6) { showError('register-error', '⚠️ كلمة المرور يجب أن تكون 6 أحرف على الأقل'); return; }
    if (pass !== pass2)  { showError('register-error', '⚠️ كلمتا المرور غير متطابقتين'); return; }
    if (!terms)  { showError('register-error', '⚠️ يجب الموافقة على الشروط والأحكام'); return; }

    const fullName = (fname + ' ' + lname).trim();
    const btn = document.querySelector('#form-register .auth-btn');
    if (btn) { btn.disabled = true; btn.textContent = '⏳ جارٍ إنشاء الحساب...'; }

    try {
      await new Promise(r => { if (window.Supabase) r(); else { const t = setInterval(() => { if (window.Supabase) { clearInterval(t); r(); } }, 100); setTimeout(() => { clearInterval(t); r(); }, 4000); } });

      await window.Supabase.Auth.signUp(email, pass, { full_name: fullName, phone });

      // حفظ بيانات مؤقتة (قد يحتاج تفعيل بريد إلكتروني)
      localStorage.setItem(PROFILE_KEY, JSON.stringify({ name: fullName, email, phone }));
      localStorage.setItem('x2_logged', '1');

      // حفظ في customers أيضاً
      try { await window.Supabase.Customers.upsert({ name: fullName, email, phone }); } catch(e) {}

      showSuccess('تم إنشاء حسابك! 🎉', 'مرحباً ' + fname + '! تحقق من بريدك لتفعيل الحساب.');
      setTimeout(() => { window.location.href = 'account.html'; }, 2000);

    } catch(err) {
      // fallback محلي
      try {
        const users = JSON.parse(localStorage.getItem('x2_users') || '[]');
        if (users.find(u => u.email === email)) { showError('register-error', '❌ البريد مسجّل مسبقاً'); if (btn) { btn.disabled = false; btn.textContent = 'إنشاء حساب'; } return; }
        users.push({ name: fullName, email, phone, pass: btoa(pass), date: new Date().toISOString() });
        localStorage.setItem('x2_users', JSON.stringify(users));
        localStorage.setItem(PROFILE_KEY, JSON.stringify({ name: fullName, email, phone }));
        localStorage.setItem('x2_logged', '1');
        showSuccess('تم إنشاء حسابك! 🎉', 'مرحباً ' + fname + '!');
        setTimeout(() => { window.location.href = 'account.html'; }, 1500);
        return;
      } catch(e2) {}

      const msg = err.message || '';
      if (msg.includes('already registered') || msg.includes('already been registered')) {
        showError('register-error', '❌ هذا البريد الإلكتروني مسجّل بالفعل. جرّب تسجيل الدخول.');
      } else {
        showError('register-error', '❌ ' + msg);
      }
      if (btn) { btn.disabled = false; btn.textContent = 'إنشاء حساب'; }
    }
  }

  function showSuccess(title, msg) {
    document.getElementById('form-login').classList.remove('active');
    document.getElementById('form-register').classList.remove('active');
    document.getElementById('auth-success').style.display = 'block';
    document.getElementById('success-title').textContent = title;
    document.getElementById('success-msg').textContent = msg;
  }

  function showForgot() {
    const email = document.getElementById('login-email').value.trim();
    if (!email) { showError('login-error', '⚠️ أدخل بريدك الإلكتروني أولاً ثم اضغط نسيت كلمة المرور'); return; }
    alert('📧 تم إرسال رابط إعادة تعيين كلمة المرور إلى: ' + email + '\n(ميزة قيد التطوير)');
  }

  function socialLogin(provider) {
    const redirectTo = 'https://bariqgifts.com/login.html';
    const oauthUrl = _SB_URL + '/auth/v1/authorize?provider=' + provider
      + '&redirect_to=' + encodeURIComponent(redirectTo);
    // فتح في متصفح خارجي لتجنب حجب Google للـ WebView
    const isStandalone = window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone;
    if (isStandalone) {
      window.open(oauthUrl, '_blank');
    } else {
      window.location.href = oauthUrl;
    }
  }

  // معالجة رجوع OAuth (Google / Facebook)
  async function handleOAuthCallback() {
    const hash = window.location.hash;
    if (!hash || !hash.includes('access_token')) return;

    const params = new URLSearchParams(hash.substring(1));
    const accessToken = params.get('access_token');
    if (!accessToken) return;

    // إزالة الهاش من URL
    history.replaceState(null, '', window.location.pathname + window.location.search);

    try {
      const res = await fetch(_SB_URL + '/auth/v1/user', {
        headers: { apikey: _SB_ANON, Authorization: 'Bearer ' + accessToken }
      });
      if (!res.ok) throw new Error('auth failed');
      const user = await res.json();

      const meta = user.user_metadata || {};
      const fullName = meta.full_name || meta.name || user.email || '';
      const nameParts = fullName.trim().split(' ');
      const profile = {
        fname: nameParts[0] || '',
        lname: nameParts.slice(1).join(' ') || '',
        name: fullName,
        email: user.email || '',
        phone: meta.phone || '',
        avatar: meta.avatar_url || meta.picture || ''
      };

      localStorage.setItem(PROFILE_KEY, JSON.stringify(profile));
      localStorage.setItem('x2_logged', '1');
      showSuccess('مرحباً ' + (profile.fname || '') + '!', 'تم تسجيل الدخول بنجاح عبر ' + (meta.iss || 'OAuth'));
      setTimeout(() => { window.location.href = 'account.html'; }, 1500);
    } catch (e) {
      showError('login-error', '❌ فشل تسجيل الدخول الاجتماعي. حاول مرة أخرى.');
    }
  }

  // معالجة رجوع OAuth أولاً
  handleOAuthCallback();

  // التحقق إذا كان مسجل دخول (تجاهل الفحص لو قادم من تسجيل الخروج)
  const _fromLogout = new URLSearchParams(window.location.search).get('logout') === '1';
  if (!_fromLogout && localStorage.getItem('x2_logged') === '1') {
    const p = JSON.parse(localStorage.getItem(PROFILE_KEY) || '{}');
    if (confirm('مرحباً ' + (p.name || '') + '! أنت مسجّل الدخول بالفعل.\nهل تريد الذهاب لحسابك؟')) {
      window.location.href = 'account.html';
    }
  }

  // فتح التبويب المطلوب من URL
  const urlTab = new URLSearchParams(window.location.search).get('tab');
  if (urlTab === 'register') switchTab('register');
  </script>

<script src="java/supabase.js" defer></script>
