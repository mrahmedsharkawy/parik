  <meta charset="UTF-8" />
  <title>تسجيل الدخول - Bariq</title>

  <style>
    /* === override main === */
    body { background: #f4f5f702; }
    #main.main {
      width: 100% !important;
      max-width: 100% !important;
      display: flex !important;
      flex-direction: column !important;
      align-items: center !important;
      justify-content: center !important;
      margin: 0 !important;
      padding: 80px 16px 40px !important;
      min-height: 100vh !important;
      box-sizing: border-box !important;
    }

    /* === بطاقة الدخول === */
    .auth-card {
      background: #fff;
      border-radius: 20px;
      border: 1px solid #eee;
      box-shadow: 0 8px 40px rgba(0,0,0,0.08);
      width: 100%;
      max-width: 460px;
      overflow: hidden;
    }

    /* الشعار */
    .auth-logo {
      text-align: center;
      padding: 28px 24px 0;
    }
    .auth-logo img { height: 40px; }
    .auth-logo h2 {
      font-size: 1.4rem;
      font-weight: 800;
      color: #111;
      margin: 12px 0 4px;
    }
    .auth-logo p { font-size: 0.85rem; color: #888; margin: 0 0 20px; }

    /* التبويبات */
    .auth-tabs {
      display: grid;
      grid-template-columns: 1fr 1fr;
      border-bottom: 1px solid #f0f0f0;
    }
    .auth-tab {
      padding: 14px;
      text-align: center;
      font-size: 0.92rem;
      font-weight: 700;
      color: #888;
      cursor: pointer;
      border-bottom: 3px solid transparent;
      transition: all 0.2s;
    }
    .auth-tab.active { color: #D4AF37; border-bottom-color: #D4AF37; background: rgba(21,37,70,0.07); }

    /* النماذج */
    .auth-form { padding: 24px; display: none; }
    .auth-form.active { display: block; }

    .auth-input-group { margin-bottom: 16px; }
    .auth-input-group label {
      display: block;
      font-size: 0.82rem;
      font-weight: 700;
      color: #444;
      margin-bottom: 6px;
    }
    .auth-input-wrap {
      position: relative;
      display: flex;
      align-items: center;
    }
    .auth-input-wrap input {
      width: 100%;
      border: 1.5px solid #e0e0e0;
      border-radius: 10px;
      padding: 11px 14px 11px 42px;
      font-size: 0.88rem;
      outline: none;
      transition: border-color 0.15s;
      box-sizing: border-box;
      color: #222;
    }
    .auth-input-wrap input:focus { border-color: #D4AF37; }
    .auth-input-wrap .input-ico {
      position: absolute;
      left: 14px;
      font-size: 1rem;
      color: #bbb;
      pointer-events: none;
    }
    .auth-input-wrap .toggle-pass {
      position: absolute;
      right: 12px;
      font-size: 0.85rem;
      color: #aaa;
      cursor: pointer;
      padding: 4px;
    }
    .auth-input-wrap input:focus + .toggle-pass,
    .auth-input-wrap .toggle-pass:hover { color: #D4AF37; }

    /* خطأ */
    .auth-error {
      background: #fff0f0;
      color: #c62828;
      border: 1px solid #ffcdd2;
      border-radius: 8px;
      padding: 9px 14px;
      font-size: 0.82rem;
      margin-bottom: 14px;
      display: none;
    }

    /* الزر الرئيسي */
    .auth-btn {
      width: 100%;
      background: linear-gradient(135deg, #152546, #0d1c38);
      color: #fff;
      border: none;
      border-radius: 50px;
      padding: 14px;
      font-size: 0.95rem;
      font-weight: 800;
      cursor: pointer;
      transition: opacity 0.15s;
      margin-top: 4px;
    }
    .auth-btn:hover { opacity: 0.93; }
    .auth-btn:disabled { opacity: 0.6; cursor: not-allowed; }

    /* نسيت كلمة المرور */
    .auth-forgot {
      text-align: left;
      margin-bottom: 14px;
    }
    .auth-forgot a {
      font-size: 0.8rem;
      color: #D4AF37;
      text-decoration: none;
      font-weight: 600;
    }

    /* فاصل */
    .auth-divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 18px 0;
      color: #ccc;
      font-size: 0.8rem;
    }
    .auth-divider::before,
    .auth-divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: #eee;
    }

    /* تسجيل بالشبكات الاجتماعية */
    .auth-social { display: flex; gap: 10px; margin-bottom: 4px; }
    .auth-social-btn {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 10px;
      border: 1.5px solid #e0e0e0;
      border-radius: 10px;
      font-size: 0.82rem;
      font-weight: 600;
      color: #333;
      cursor: pointer;
      background: #fff;
      transition: border-color 0.15s, background 0.15s;
    }
    .auth-social-btn:hover { border-color: #D4AF37; background: rgba(21,37,70,0.07); }
    .auth-social-btn img { width: 18px; height: 18px; }

    /* قوة كلمة المرور */
    .strength-bar {
      height: 4px;
      border-radius: 4px;
      background: #eee;
      margin-top: 6px;
      overflow: hidden;
    }
    .strength-fill {
      height: 100%;
      width: 0%;
      border-radius: 4px;
      transition: width 0.3s, background 0.3s;
    }
    .strength-label { font-size: 0.72rem; color: #888; margin-top: 3px; }

    /* موافقة الشروط */
    .auth-terms {
      display: flex;
      align-items: flex-start;
      gap: 8px;
      font-size: 0.78rem;
      color: #666;
      margin-bottom: 16px;
      line-height: 1.5;
    }
    .auth-terms input[type="checkbox"] {
      accent-color: #D4AF37;
      width: 16px;
      height: 16px;
      flex-shrink: 0;
      margin-top: 2px;
    }
    .auth-terms a { color: #D4AF37; text-decoration: none; }

    /* footer */
    .auth-footer {
      text-align: center;
      padding: 16px 24px 20px;
      font-size: 0.82rem;
      color: #888;
      border-top: 1px solid #f5f5f5;
    }
    .auth-footer a { color: #D4AF37; font-weight: 600; text-decoration: none; }

    /* نجاح */
    .auth-success {
      display: none;
      text-align: center;
      padding: 40px 24px;
    }
    .auth-success .s-icon { font-size: 3.5rem; margin-bottom: 12px; }
    .auth-success h3 { font-size: 1.1rem; font-weight: 700; color: #111; margin-bottom: 8px; }
    .auth-success p { font-size: 0.85rem; color: #888; margin-bottom: 20px; }

    /* موبايل */
    @media (max-width: 480px) {
      .auth-card { border-radius: 16px; }
      .auth-social { flex-direction: column; }
    }
  </style>
</head>

<div class="page">

  <main class="main" id="main">

    <div class="auth-card">

      <div class="auth-logo">

        <p>سجّل دخولك أو أنشئ حساباً جديداً</p>

      <div class="auth-form active" id="form-login">

        <div class="auth-input-group">

        <div class="auth-input-group">

        <div class="auth-input-group">

          <div class="auth-input-wrap">
            <input type="text" id="reg-identifier" placeholder="example@email.com أو اسم المستخدم" autocomplete="username">

        <div class="auth-input-group">

        <div class="auth-input-group">
          <label>رقم الهاتف</label>
          <div class="auth-input-wrap">

            <span class="input-ico">📱</span>
          </div>
        </div>

        <div class="auth-input-group">
          <label>كلمة المرور</label>
          <div class="auth-input-wrap">
            <input type="password" id="reg-pass" placeholder="8 أحرف على الأقل" autocomplete="new-password" oninput="checkStrength(this.value)">
            <span class="input-ico">🔒</span>
            <span class="toggle-pass" onclick="togglePass('reg-pass', this)">👁</span>
          </div>
          <div class="strength-bar"><div class="strength-fill" id="strength-fill"></div></div>
          <div class="strength-label" id="strength-label"></div>

        <button class="auth-btn" onclick="doRegister()">إنشاء حساب جديد</button>

      <!-- نجاح -->
      <div class="auth-success" id="auth-success">

      <div class="auth-footer">

  <script>
  /* === Auth Logic === */
  const PROFILE_KEY = 'x2_profile';
  const _SB_URL = 'https://knleehjjejfeobcmpwnw.supabase.co';
  const _SB_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtubGVlaGpqZWpmZW9iY21wd253Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQwMjk1NzAsImV4cCI6MjA5OTYwNTU3MH0.Q5Peb8CXDYNSPtQJGK6meij4vFRfOUq9qFz4rHBXE8E';

  function switchTab(tab) {
    document.querySelectorAll('.auth-tab').forEach((t,i) => t.classList.toggle('active', (i===0&&tab==='login')||(i===1&&tab==='register')));
    document.getElementById('form-login').classList.toggle('active', tab==='login');
    document.getElementById('form-register').classList.toggle('active', tab==='register');
    document.getElementById('auth-success').style.display = 'none';
    hideErrors();
  }

  function togglePass(id, el) {
    const inp = document.getElementById(id);
    if (inp.type === 'password') { inp.type = 'text'; el.textContent = '🙈'; }
    else { inp.type = 'password'; el.textContent = '👁'; }
  }

  function showError(id, msg) {
    const el = document.getElementById(id);
    el.textContent = msg;
    el.style.display = 'block';
  }

  function hideErrors() {
    ['login-error','register-error'].forEach(id => {
      const el = document.getElementById(id);
      if (el) { el.style.display = 'none'; el.textContent = ''; }
    });
  }

  function checkStrength(pass) {
    const fill = document.getElementById('strength-fill');
    const label = document.getElementById('strength-label');
    if (!pass) { fill.style.width = '0%'; label.textContent = ''; return; }
    let score = 0;
    if (pass.length >= 8) score++;
    if (/[A-Z]/.test(pass)) score++;
    if (/[0-9]/.test(pass)) score++;
    if (/[^A-Za-z0-9]/.test(pass)) score++;
    const levels = [
      { w:'25%', c:'#e53935', t:'ضعيفة' },
      { w:'50%', c:'#fb8c00', t:'مقبولة' },
      { w:'75%', c:'#fdd835', t:'جيدة' },
      { w:'100%', c:'#43a047', t:'قوية جداً' }
    ];
    const l = levels[Math.max(0, score-1)];
    fill.style.width = l.w;
    fill.style.background = l.c;
    label.textContent = 'قوة كلمة المرور: ' + l.t;
    label.style.color = l.c;
  }

  function normalizePhone(value) {
    return String(value || '').replace(/[^\d+]/g, '').replace(/(?!^)\+/g, '');
  }

  function identifierToAuthEmail(identifier) {
    const value = String(identifier || '').trim().toLowerCase();
    if (/^\S+@\S+\.\S+$/.test(value)) return value;
    const normalized = value.replace(/[^a-z0-9._-]/g, '') || Array.from(value).map(ch => ch.codePointAt(0).toString(16)).join('');
    return normalized + '@users.bariqgifts.com';
  }

  async function doLogin() {
    hideErrors();
    const identifier = document.getElementById('login-email').value.trim();
    const email = identifierToAuthEmail(identifier);
    const pass  = document.getElementById('login-pass').value;
    const btn   = document.querySelector('#form-login .auth-btn');

    if (!identifier) { showError('login-error', '⚠️ أدخل البريد الإلكتروني أو رقم الهاتف أو اسم المستخدم'); return; }
    if (!pass)  { showError('login-error', '⚠️ من فضلك أدخل كلمة المرور'); return; }

    if (btn) { btn.disabled = true; btn.textContent = '⏳ جارٍ التحقق...'; }

    // محاولة تسجيل الدخول عبر Supabase Auth
    try {
      await new Promise(r => { if (window.Supabase) r(); else { const t = setInterval(() => { if (window.Supabase) { clearInterval(t); r(); } }, 100); setTimeout(() => { clearInterval(t); r(); }, 4000); } });

      const data = await window.Supabase.Auth.signIn(email, pass);
      const user = data.user || {};
      const meta = user.user_metadata || {};
      const name = meta.full_name || meta.name || email.split('@')[0];
      const identifier = meta.identifier || user.email || email;
      const publicEmail = /^\S+@\S+\.\S+$/.test(identifier) ? identifier.toLowerCase() : '';

      // حفظ الجلسة
      localStorage.setItem(PROFILE_KEY, JSON.stringify({ name, identifier, username: publicEmail ? '' : identifier, email: publicEmail, authEmail: user.email || email, phone: meta.phone || '', city: meta.city || '', address_full: { city: meta.city || '' } }));
      localStorage.setItem('x2_logged', '1');
      if (data.access_token) localStorage.setItem('x2_token', data.access_token);

      // مزامنة مع جدول customers
      try { await window.Supabase.Customers.upsert({ name, email: publicEmail, phone: meta.phone || '', city: meta.city || '' }); } catch(e) {}

      showSuccess('تم تسجيل الدخول بنجاح! 🎉', 'مرحباً ' + name.split(' ')[0] + '! جارٍ تحويلك...');
      setTimeout(() => { window.location.href = 'account.html'; }, 1200);

    } catch(supaErr) {
      // fallback للتحقق المحلي (لأجهزة بدون اتصال)
      try {
        const users = JSON.parse(localStorage.getItem('x2_users') || '[]');
        const user = users.find(u => u.identifier === identifier || u.email === identifier || u.phone === normalizePhone(identifier));
        if (user && user.pass === btoa(pass)) {
          const publicEmail = /^\S+@\S+\.\S+$/.test(user.identifier || '') ? user.identifier.toLowerCase() : '';
          localStorage.setItem(PROFILE_KEY, JSON.stringify({ name: user.name, identifier: user.identifier || identifier, username: publicEmail ? '' : user.identifier || identifier, email: publicEmail, authEmail: user.email || email, phone: user.phone || '', city: user.city || '', address_full: { city: user.city || '' } }));
          localStorage.setItem('x2_logged', '1');
          showSuccess('تم تسجيل الدخول! 🎉', 'جارٍ تحويلك...');
          setTimeout(() => { window.location.href = 'account.html'; }, 1200);
          return;
        }
      } catch(e) {}

      const msg = supaErr.message || '';
      if (msg.includes('Invalid login') || msg.includes('invalid') || msg.includes('credentials')) {
        showError('login-error', '❌ البريد الإلكتروني أو كلمة المرور غير صحيحة');
      } else if (msg.includes('Email not confirmed')) {
        showError('login-error', '📧 يرجى تفعيل حسابك من البريد الإلكتروني أولاً');
      } else {
        showError('login-error', '❌ ' + msg);
      }
      if (btn) { btn.disabled = false; btn.textContent = 'تسجيل الدخول'; }
    }
  }

  async function doRegister() {
    hideErrors();
    const fullName = document.getElementById('reg-name').value.trim();
    const identifier = document.getElementById('reg-identifier').value.trim();
    const city = document.getElementById('reg-city').value.trim();
    const phone = normalizePhone(document.getElementById('reg-phone').value);
    const email = identifierToAuthEmail(identifier);
    const pass  = document.getElementById('reg-pass').value;

    if (!fullName) { showError('register-error', '⚠️ أدخل الاسم'); return; }
    if (!identifier) { showError('register-error', '⚠️ أدخل البريد الإلكتروني أو رقم الهاتف أو اسم المستخدم'); return; }
    if (!city) { showError('register-error', '⚠️ أدخل المدينة'); return; }
    if (phone.replace(/\D/g, '').length < 7) { showError('register-error', '⚠️ أدخل رقم هاتف صحيح'); return; }
    if (pass.length < 6) { showError('register-error', '⚠️ كلمة المرور يجب أن تكون 6 أحرف على الأقل'); return; }

    const btn = document.querySelector('#form-register .auth-btn');
    if (btn) { btn.disabled = true; btn.textContent = '⏳ جارٍ إنشاء الحساب...'; }

    try {
      await new Promise(r => { if (window.Supabase) r(); else { const t = setInterval(() => { if (window.Supabase) { clearInterval(t); r(); } }, 100); setTimeout(() => { clearInterval(t); r(); }, 4000); } });

      await window.Supabase.Auth.signUp(email, pass, { full_name: fullName, phone, city, identifier });

      // حفظ بيانات مؤقتة (قد يحتاج تفعيل بريد إلكتروني)
      const publicEmail = /^\S+@\S+\.\S+$/.test(identifier) ? identifier.toLowerCase() : '';
      localStorage.setItem(PROFILE_KEY, JSON.stringify({ name: fullName, identifier, username: publicEmail ? '' : identifier, email: publicEmail, authEmail: email, phone, city, address_full: { city } }));
      localStorage.setItem('x2_logged', '1');

      // حفظ في customers أيضاً
      await window.Supabase.Customers.upsert({ name: fullName, email: publicEmail, phone, city });

      showSuccess('تم إنشاء حسابك! 🎉', 'مرحباً ' + fullName.split(' ')[0] + '!');
      setTimeout(() => { window.location.href = 'account.html'; }, 2000);

    } catch(err) {
      // fallback محلي
      try {
        const users = JSON.parse(localStorage.getItem('x2_users') || '[]');
        if (users.find(u => u.identifier === identifier || u.email === email || u.phone === phone)) { showError('register-error', '❌ بيانات الدخول أو رقم الهاتف مسجلة مسبقاً'); if (btn) { btn.disabled = false; btn.textContent = 'إنشاء حساب'; } return; }
        users.push({ name: fullName, identifier, email, phone, city, pass: btoa(pass), date: new Date().toISOString() });
        localStorage.setItem('x2_users', JSON.stringify(users));
        localStorage.setItem(PROFILE_KEY, JSON.stringify({ name: fullName, identifier, email: /^\S+@\S+\.\S+$/.test(identifier) ? identifier.toLowerCase() : '', authEmail: email, phone, city, address_full: { city } }));
        localStorage.setItem('x2_logged', '1');
        showSuccess('تم إنشاء حسابك! 🎉', 'مرحباً ' + fullName.split(' ')[0] + '!');
        setTimeout(() => { window.location.href = 'account.html'; }, 1500);
        return;
      } catch(e2) {}

      const msg = err.message || '';
      if (msg.includes('already registered') || msg.includes('already been registered')) {
        showError('register-error', '❌ هذا البريد الإلكتروني مسجّل بالفعل. جرّب تسجيل الدخول.');
      } else {
        showError('register-error', '❌ ' + msg);
      }
      if (btn) { btn.disabled = false; btn.textContent = 'إنشاء حساب'; }
    }
  }

  function showSuccess(title, msg) {
    document.getElementById('form-login').classList.remove('active');
    document.getElementById('form-register').classList.remove('active');
    document.getElementById('auth-success').style.display = 'block';
    document.getElementById('success-title').textContent = title;
    document.getElementById('success-msg').textContent = msg;
  }

  function showForgot() {
    const email = document.getElementById('login-email').value.trim();
    if (!email) { showError('login-error', '⚠️ أدخل بريدك الإلكتروني أولاً ثم اضغط نسيت كلمة المرور'); return; }
    alert('📧 تم إرسال رابط إعادة تعيين كلمة المرور إلى: ' + email + '\n(ميزة قيد التطوير)');
  }

  // التحقق إذا كان مسجل دخول (تجاهل الفحص لو قادم من تسجيل الخروج)
  const _fromLogout = new URLSearchParams(window.location.search).get('logout') === '1';
  if (!_fromLogout && localStorage.getItem('x2_logged') === '1') {
    const p = JSON.parse(localStorage.getItem(PROFILE_KEY) || '{}');
    if (confirm('مرحباً ' + (p.name || '') + '! أنت مسجّل الدخول بالفعل.\nهل تريد الذهاب لحسابك؟')) {
      window.location.href = 'account.html';
    }
  }

  // فتح التبويب المطلوب من URL
  const urlTab = new URLSearchParams(window.location.search).get('tab');
  if (urlTab === 'register') switchTab('register');
  </script>
